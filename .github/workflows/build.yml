name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    # Manual publish, the same Modrinth upload a `v*` tag would do.

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test every version node
        run: ./gradlew chiseledBuild

      - name: Run GameTests (headless in-world suite)
        run: ./gradlew runGametest

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: fallow
          path: versions/**/build/libs/*.jar

  publish:
    # Runs on a version tag (e.g. v0.2.0) or a manual workflow_dispatch; requires the
    # MODRINTH_TOKEN repo secret. Publishes every version node, each with its own gameVersions.
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish every version node to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: ./gradlew chiseledPublishMods

      - name: Sync Modrinth project page (body from README)
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          # Use the pinned project id (slugs are not stable identifiers), and fail the job on a
          # bad response instead of going green with the page unsynced.
          MODRINTH_ID=$(sed -n 's/^mod.modrinth_id = "\(.*\)"$/\1/p' stonecutter.properties.toml)
          jq -Rs '{body: .}' README.md > /tmp/body.json
          curl -sS --fail-with-body -X PATCH \
            -H "Authorization: $MODRINTH_TOKEN" \
            -H "Content-Type: application/json" \
            --data @/tmp/body.json \
            "https://api.modrinth.com/v2/project/$MODRINTH_ID"
